<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="BizTrack Project by Sumayyah"/>
    <meta property="og:description" content="A project born out of real small business challenges, now simplifying product, order, and finance management."/>
    <meta property="og:image:secure_url" content="https://i.imgur.com/0O47fVi.jpg"/>
    <meta property="og:url" content="https://sumusa.github.io/biztrack/"/>
    <link rel="stylesheet" href="./styles.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
    <title>Orders - BizTrack</title>
</head>
<body>
    <nav id="sidebar" class="sidebar" aria-label="Primary navigation" data-i18n-aria-label="primaryNavigation">
        <div class="logo">
            <a href="./index.html">
                <i class="fas fa-b"></i>
                <span>BizTrack</span>
            </a>
            <button type="button" class="icon-button sidebar-close" aria-label="Close sidebar" data-i18n-aria-label="closeSidebar">
                <i class="fa-solid fa-xmark" aria-hidden="true"></i>
            </button>
        </div>
        <ul class="menu">
            <li>
                <a href="./index.html">
                    <i class="fa-solid fa-gauge-high"></i>
                    <span data-i18n="dashboard">Dashboard</span>
                </a>
            </li>
            <li>
                <a href="./products.html">
                    <i class="fas fa-dolly"></i>
                    <span data-i18n="products">Products</span>
                </a>
            </li>
            <li>
                <a href="./inventory.html">
                    <i class="fa-solid fa-boxes-stacked"></i>
                    <span data-i18n="inventory">Inventory</span>
                </a>
            </li>
            <li class="active">
                <a href="./orders.html" aria-current="page">
                    <i class="fas fa-shopping-cart"></i>
                    <span data-i18n="orders">Orders</span>
                </a>
            </li>
            <li>
                <a href="./finances.html">
                    <i class="fas fa-sack-dollar"></i>
                    <span data-i18n="expenses">Expenses</span>
                </a>
            </li>
            <li>
                <a href="./help.html">
                    <i class="fas fa-question-circle"></i>
                    <span data-i18n="help">Help</span>
                </a>
            </li>
            <li>
                <a href="./about.html">
                    <i class="fa-solid fa-users-line"></i>
                    <span data-i18n="about">About</span>
                </a>
            </li>
        </ul>
        <div class="sidebar-footer user-panel">
            <button type="button" class="user-panel-button" id="user-menu-button" aria-haspopup="menu" aria-expanded="false" aria-controls="user-menu" aria-label="Open user menu" data-i18n-aria-label="openUserMenu">
                <span class="user-avatar" aria-hidden="true">S</span>
                <span class="user-meta">
                    <span class="user-name" data-i18n="settings">Settings</span>
                    <span class="user-plan" data-i18n="preferences">Preferences</span>
                </span>
                <i class="fa-solid fa-chevron-right user-panel-chevron" aria-hidden="true"></i>
            </button>
            <div class="user-menu" id="user-menu" role="menu" hidden>
                <button type="button" class="user-menu-item" role="menuitem" data-user-action="preferences">
                    <i class="fa-solid fa-wand-magic-sparkles" aria-hidden="true"></i>
                    <span data-i18n="preferences">Preferences</span>
                </button>
                <button type="button" class="user-menu-item" role="menuitem" data-user-action="storage">
                    <i class="fa-solid fa-database" aria-hidden="true"></i>
                    <span data-i18n="dataStorage">Data &amp; Storage</span>
                </button>
                <button type="button" class="user-menu-item" role="menuitem" data-user-action="privacy">
                    <i class="fa-solid fa-shield-halved" aria-hidden="true"></i>
                    <span data-i18n="privacyPolicy">Privacy Policy</span>
                </button>
                <div class="user-menu-divider"></div>
                <a class="user-menu-item" role="menuitem" href="./help.html">
                    <i class="fa-solid fa-circle-question" aria-hidden="true"></i>
                    <span data-i18n="help">Help</span>
                </a>
                <a class="user-menu-item" role="menuitem" href="./about.html">
                    <i class="fa-solid fa-circle-info" aria-hidden="true"></i>
                    <span data-i18n="about">About</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <header class="header-wrapper">
            <button type="button" class="menu-icon" aria-label="Open sidebar" data-i18n-aria-label="openSidebar">
                <i class="fa-solid fa-bars" aria-hidden="true"></i>
            </button>
            <div class="header-title">
                <!-- <span>Primary</span> -->
                <h2 data-i18n="orders">Orders</h2>
            </div>
            <div class="user-info header-actions">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="search" id="searchInput" placeholder="Search" data-i18n-placeholder="search">
                </div>
                <button type="button" id="language-toggle" class="language-toggle header-language-toggle" aria-label="Switch language to Chinese" title="Switch language to Chinese" data-active="en">
                    <span class="language-toggle-slider" aria-hidden="true"></span>
                    <span class="language-toggle-option is-active" data-lang-option="en">EN</span>
                    <span class="language-toggle-option" data-lang-option="zh">CN</span>
                </button>
                <!-- <i class="fas fa-user-alt fa-xl"></i> -->
            </div>
        </header>

        <div class="table-wrapper page-enter">
            <div class="orders-summary-grid" id="orders-summary">
                <article class="orders-summary-card">
                    <span data-i18n="pending">Pending</span>
                    <strong id="orders-pending-count">0</strong>
                </article>
                <article class="orders-summary-card">
                    <span data-i18n="processing">Processing</span>
                    <strong id="orders-processing-count">0</strong>
                </article>
                <article class="orders-summary-card">
                    <span data-i18n="shipped">Shipped</span>
                    <strong id="orders-shipped-count">0</strong>
                </article>
                <article class="orders-summary-card">
                    <span data-i18n="delivered">Delivered</span>
                    <strong id="orders-delivered-count">0</strong>
                </article>
            </div>
            <div class="product-title">
                <h3 class="main-title" data-i18n="orders">Orders</h3>
                <div class="order-button">
                    <button type="button" class="add-button" data-i18n="addOrder">Add Order</button>
                    <button type="button" class="download-button" data-i18n="exportCSV">Export to CSV</button>
                </div>
            </div>

            <div class="form-popup">
                <form class="form-container" id="order-form" inert>
                    <div class="form-columns">

                        <div class="order-first-col">
                            <label for="order-id" data-i18n="orderID"><b>Order ID: </b></label>
                            <input type="number" id="order-id" placeholder="1001" min="1" step="1" required>

                            <label for="order-date" data-i18n="orderDate"><b>Order Date: </b></label>
                            <input type="date" id="order-date" required>

                            <label for="item-name" data-i18n="itemName"><b>Item Name: </b></label>
                            <select name="item-name" id="item-name" required>
                                <option value="" disabled selected hidden data-i18n="chooseItem">Choose an item</option>
                                <optgroup label="Hats" data-i18n-label="hats">
                                    <option value="Baseball caps" data-i18n="baseballCaps">Baseball caps</option>
                                    <option value="Snapbacks" data-i18n="snapbacks">Snapbacks</option>
                                    <option value="Beanies" data-i18n="beanies">Beanies</option>
                                    <option value="Bucket hats" data-i18n="bucketHats">Bucket hats</option>
                                </optgroup>
                                <optgroup label="Drinkware" data-i18n-label="drinkware">
                                    <option value="Mugs" data-i18n="mugs">Mugs</option>
                                    <option value="Water bottles" data-i18n="waterBottles">Water bottles</option>
                                    <option value="Tumblers" data-i18n="tumblers">Tumblers</option>
                                </optgroup>   
                                <optgroup label="Clothing" data-i18n-label="clothing">
                                    <option value="T-shirts" data-i18n="tshirts">T-shirts</option>
                                    <option value="Sweatshirts" data-i18n="sweatshirts">Sweatshirts</option>
                                    <option value="Hoodies" data-i18n="hoodies">Hoodies</option>
                                </optgroup>   
                                <optgroup label="Accessories" data-i18n-label="accessories">
                                    <option value="Pillow cases" data-i18n="pillowCases">Pillow cases</option>
                                    <option value="Tote bags" data-i18n="toteBags">Tote bags</option>
                                    <option value="Stickers" data-i18n="stickers">Stickers</option>
                                </optgroup>   
                                <optgroup label="Home decor" data-i18n-label="homeDecor">
                                    <option value="Posters" data-i18n="posters">Posters</option>
                                    <option value="Framed posters" data-i18n="framedPosters">Framed posters</option>
                                    <option value="Canvas prints" data-i18n="canvasPrints">Canvas prints</option>
                                </optgroup>
                            </select>
                        </div>

                        <div class="order-second-col">
                            <label for="item-price" data-i18n="itemPrice"><b>Item Price:</b></label>
                            <input type="number" id="item-price" placeholder="$0.00" min="0.01" max="10000.00" step="0.01" required>

                            <label for="qty-bought" data-i18n="quantityBought"><b>Quantity Bought:</b></label>
                            <input type="number" id="qty-bought" placeholder="1" min="1" step="1" required>

                            <label for="shipping" data-i18n="shippingFee"><b>Shipping fee:</b></label>
                            <input type="number" id="shipping" placeholder="$2.00" min="0.00" max="10000.00" step="0.01" required>
                        </div>

                        <div class="order-third-col">
                            <label for="taxes" data-i18n="taxes"><b>Taxes (VAT/GST/HST):</b></label>
                            <input type="number" id="taxes" placeholder="$2.00" min="0.00" max="10000.00" step="0.01" required>

                            <label for="order-status" data-i18n="orderStatus"><b>Order Status:</b></label>
                            <select name="order-status" id="order-status" required>
                                <option value="" disabled selected hidden data-i18n="chooseStatus">Choose a status</option>
                                <option value="Pending" data-i18n="pending">Pending</option>
                                <option value="Processing" data-i18n="processing">Processing</option>
                                <option value="Shipped" data-i18n="shipped">Shipped</option>
                                <option value="Delivered" data-i18n="delivered">Delivered</option>
                            </select>

                            <label for="order-total" data-i18n="totalOrderAmount"><b>Total Order Amount: <small>(Calculated)</small></b></label>
                            <input type="number" id="order-total" placeholder="$0.00" min="0.00" max="10000.00" step="0.01" disabled>
                        </div>
                    </div>
                    
                    <div class="button-col">
                        <button type="submit" class="btn" id="submitBtn" data-i18n="add">Add</button>
                        <button type="button" class="btn cancel" data-i18n="cancel">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <table id="order-table">
                    <thead>
                        <tr>
                            <th scope="col">
                                <button type="button" class="sort-button" data-sort-column="orderID" data-i18n="orderIDShort">Order ID</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" data-sort-column="orderDate" data-i18n="orderDateShort">Order Date</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" data-sort-column="itemName" data-i18n="itemNameShort">Item Name</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" data-sort-column="itemPrice" data-i18n="itemPriceShort">Item Price</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" data-sort-column="qtyBought" data-i18n="qty">Qty</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" data-sort-column="shipping" data-i18n="shippingFeeShort">Shipping Fee</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" data-sort-column="taxes" data-i18n="taxesShort">Taxes</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" data-sort-column="orderTotal" data-i18n="orderTotalShort">Order Total</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" data-sort-column="orderStatus" data-i18n="orderStatusShort">Order Status</button>
                            </th>
                            <th scope="col" data-i18n="action">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="10">
                                <div id="total-revenue"></div>
                            </td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </main>

    <script src="./i18n.js"></script>
    <script src="./storage.js"></script>
    <script src="./cookie-consent.js"></script>
    <script src="./user-menu.js"></script>
    <script src="./sidebar.js"></script>
    <script src="./orders.js"></script>
</body>
</html>
