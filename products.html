<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="BizTrack Project by Sumayyah"/>
    <meta property="og:description" content="A project born out of real small business challenges, now simplifying product, order, and finance management."/>
    <meta property="og:image:secure_url" content="https://i.imgur.com/0O47fVi.jpg"/>
    <meta property="og:url" content="https://sumusa.github.io/biztrack/"/>
    <link rel="stylesheet" href="./styles.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
    <title>Products - BizTrack</title>
</head>
<body>
    <nav id="sidebar" class="sidebar" aria-label="Primary navigation" data-i18n-aria-label="primaryNavigation">
        <div class="logo">
            <a href="./index.html">
                <i class="fas fa-b"></i>
                <span>BizTrack</span>
            </a>
            <button type="button" class="icon-button sidebar-close" aria-label="Close sidebar" data-i18n-aria-label="closeSidebar" onclick="closeSidebar()">
                <i class="fa-solid fa-xmark" aria-hidden="true"></i>
            </button>
        </div>
        <ul class="menu">
            <li>
                <a href="./index.html">
                    <i class="fa-solid fa-gauge-high"></i>
                    <span data-i18n="dashboard">Dashboard</span>
                </a>
            </li>
            <li class="active">
                <a href="./products.html" aria-current="page">
                    <i class="fas fa-dolly"></i>
                    <span data-i18n="products">Products</span>
                </a>
            </li>
            <li>
                <a href="./orders.html">
                    <i class="fas fa-shopping-cart"></i>
                    <span data-i18n="orders">Orders</span>
                </a>
            </li>
            <li>
                <a href="./finances.html">
                    <i class="fas fa-sack-dollar"></i>
                    <span data-i18n="expenses">Expenses</span>
                </a>
            </li>
            <li>
                <a href="./help.html">
                    <i class="fas fa-question-circle"></i>
                    <span data-i18n="help">Help</span>
                </a>
            </li>
            <li class="language-menu-item">
                <button type="button" id="language-toggle" class="language-toggle" aria-label="Switch language to Chinese" title="Switch language to Chinese">
                    <span class="lang-option" data-lang-option="en">EN</span>
                    <span class="lang-separator" aria-hidden="true">/</span>
                    <span class="lang-option" data-lang-option="zh">CN</span>
                </button>
            </li>
            <li class="logout">
                <a href="./about.html">
                    <i class="fa-solid fa-users-line"></i>
                    <span data-i18n="meetDeveloper">Meet the Developer</span>
                </a>
            </li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="header-wrapper">
            <button type="button" class="menu-icon" aria-label="Open sidebar" data-i18n-aria-label="openSidebar" onclick="openSidebar()">
                <i class="fa-solid fa-bars" aria-hidden="true"></i>
            </button>
            <div class="header-title">
                <!-- <span>Primary</span> -->
                <h2 data-i18n="products">Products</h2>
            </div>
            <div class="user-info">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="search" id="searchInput" placeholder="Search" data-i18n-placeholder="search">
                </div>
                <!-- <i class="fas fa-user-alt fa-xl"></i> -->
            </div>
        </header>

        <div class="table-wrapper">
            <div class="product-title">
                <h3 class="main-title" data-i18n="products">Products</h3>
                <div class="product-button">
                    <button class="add-button" onclick="openForm()" data-i18n="addProduct">Add Product</button>
                    <button class="download-button" onclick="exportToCSV()" data-i18n="downloadCSV">Download CSV</button>
                </div>
            </div>
            <div class="form-popup">
                <form class="form-container" id="product-form" onsubmit="addOrUpdate(event)">
                    <div class="form-columns">
                        <div class="first-col">
                            <label for="product-id" data-i18n="productID"><b>Product ID: </b></label>
                            <input type="text" id="product-id" placeholder="PD001" required>
                        
                            <label for="product-name" data-i18n="productName"><b>Product Name</b></label>
                            <select name="product-name" id="product-name" required>
                                <option value="" disabled selected hidden data-i18n="chooseProduct">Choose a product</option>
                                <optgroup label="Hats" data-i18n-label="hats">
                                    <option value="Baseball caps" data-i18n="baseballCaps">Baseball caps</option>
                                    <option value="Snapbacks" data-i18n="snapbacks">Snapbacks</option>
                                    <option value="Beanies" data-i18n="beanies">Beanies</option>
                                    <option value="Bucket hats" data-i18n="bucketHats">Bucket hats</option>
                                </optgroup>
                                <optgroup label="Drinkware" data-i18n-label="drinkware">
                                    <option value="Mugs" data-i18n="mugs">Mugs</option>
                                    <option value="Water bottles" data-i18n="waterBottles">Water bottles</option>
                                    <option value="Tumblers" data-i18n="tumblers">Tumblers</option>
                                </optgroup>   
                                <optgroup label="Clothing" data-i18n-label="clothing">
                                    <option value="T-shirts" data-i18n="tshirts">T-shirts</option>
                                    <option value="Sweatshirts" data-i18n="sweatshirts">Sweatshirts</option>
                                    <option value="Hoodies" data-i18n="hoodies">Hoodies</option>
                                </optgroup>   
                                <optgroup label="Accessories" data-i18n-label="accessories">
                                    <option value="Pillow cases" data-i18n="pillowCases">Pillow cases</option>
                                    <option value="Tote bags" data-i18n="toteBags">Tote bags</option>
                                    <option value="Stickers" data-i18n="stickers">Stickers</option>
                                </optgroup>   
                                <optgroup label="Home decor" data-i18n-label="homeDecor">
                                    <option value="Posters" data-i18n="posters">Posters</option>
                                    <option value="Framed posters" data-i18n="framedPosters">Framed posters</option>
                                    <option value="Canvas prints" data-i18n="canvasPrints">Canvas prints</option>
                                </optgroup>
                            </select>
    
                            <label for="product-desc" data-i18n="productDescription"><b>Product Description:</b></label>
                            <input type="text" id="product-desc" placeholder="Travel Mug" required>
                        </div>
                        <div class="second-col">
                            <label for="product-cat" data-i18n="productCategory"><b>Product Category:</b></label>
                            <select name="product-cat" id="product-cat" required>
                                <option value="" disabled selected data-i18n="chooseCategory">Choose a category</option>
                                <option value="Clothing" data-i18n="clothing">Clothing</option>
                                <option value="Drinkware" data-i18n="drinkware">Drinkware</option>
                                <option value="Accessories" data-i18n="accessories">Accessories</option>
                                <option value="Hats" data-i18n="hats">Hats</option>
                                <option value="Home decor" data-i18n="homeDecor">Home decor</option>
                            </select>
    
                            <label for="product-price" data-i18n="productPrice"><b>Product Price:</b></label>
                            <input type="number" id="product-price" placeholder="$0.00" min="0.00" max="10000.00" step="0.01" required>
    
                            <label for="product-sold" data-i18n="unitsSold"><b>Number of Units Sold:</b></label>
                            <input type="number" id="product-sold" placeholder="10" required>
                        </div>
                    </div>
                    
                    <div class="button-col">
                        <button type="submit" class="btn" id="submitBtn" data-i18n="add">Add</button>
                        <button type="button" class="btn cancel" onclick="closeForm()" data-i18n="cancel">Cancel</button>
                    </div>
                </form>
            </div>
            <div class="table-container">
                <table id="product-table">
                    <thead>
                        <tr>
                            <th scope="col">
                                <button type="button" class="sort-button" onclick="sortTable('prodID', this)" data-i18n="productIDShort">Product ID</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" onclick="sortTable('prodName', this)" data-i18n="productName">Product Name</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" onclick="sortTable('prodDesc', this)" data-i18n="description">Description</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" onclick="sortTable('prodCat', this)" data-i18n="category">Category</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" onclick="sortTable('prodPrice', this)" data-i18n="price">Price</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" onclick="sortTable('prodSold', this)" data-i18n="unitsSoldShort">Units Sold</button>
                            </th>
                            <th scope="col" data-i18n="action">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                    <!-- <tfoot>
                        <tr>
                            <td colspan="11"><a href="#">View more orders</a></td>
                        </tr>
                    </tfoot> -->
                </table>
            </div>
        </div>
    </main>
    <script src="./i18n.js"></script>
    <script src="./products.js"></script>
</body>
</html>
