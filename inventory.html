<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="BizTrack Project by Sumayyah"/>
    <meta property="og:description" content="A project born out of real small business challenges, now simplifying product, order, and finance management."/>
    <meta property="og:image:secure_url" content="https://i.imgur.com/0O47fVi.jpg"/>
    <meta property="og:url" content="https://sumusa.github.io/biztrack/"/>
    <link rel="stylesheet" href="./styles.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
    <title>Inventory - BizTrack</title>
</head>
<body>
    <nav id="sidebar" class="sidebar" aria-label="Primary navigation" data-i18n-aria-label="primaryNavigation">
        <div class="logo">
            <a href="./index.html">
                <i class="fas fa-b"></i>
                <span>BizTrack</span>
            </a>
            <button type="button" class="icon-button sidebar-close" aria-label="Close sidebar" data-i18n-aria-label="closeSidebar" onclick="closeSidebar()">
                <i class="fa-solid fa-xmark" aria-hidden="true"></i>
            </button>
        </div>
        <ul class="menu">
            <li>
                <a href="./index.html">
                    <i class="fa-solid fa-gauge-high"></i>
                    <span data-i18n="dashboard">Dashboard</span>
                </a>
            </li>
            <li>
                <a href="./products.html">
                    <i class="fas fa-dolly"></i>
                    <span data-i18n="products">Products</span>
                </a>
            </li>
            <li class="active">
                <a href="./inventory.html" aria-current="page">
                    <i class="fa-solid fa-boxes-stacked"></i>
                    <span data-i18n="inventory">Inventory</span>
                </a>
            </li>
            <li>
                <a href="./orders.html">
                    <i class="fas fa-shopping-cart"></i>
                    <span data-i18n="orders">Orders</span>
                </a>
            </li>
            <li>
                <a href="./finances.html">
                    <i class="fas fa-sack-dollar"></i>
                    <span data-i18n="expenses">Expenses</span>
                </a>
            </li>
            <li>
                <a href="./help.html">
                    <i class="fas fa-question-circle"></i>
                    <span data-i18n="help">Help</span>
                </a>
            </li>
            <li>
                <a href="./about.html">
                    <i class="fa-solid fa-users-line"></i>
                    <span data-i18n="about">About</span>
                </a>
            </li>
        </ul>
        <div class="sidebar-footer user-panel">
            <button type="button" class="user-panel-button" id="user-menu-button" aria-haspopup="menu" aria-expanded="false" aria-controls="user-menu" aria-label="Open user menu" data-i18n-aria-label="openUserMenu">
                <span class="user-avatar" aria-hidden="true">S</span>
                <span class="user-meta">
                    <span class="user-name" data-i18n="settings">Settings</span>
                    <span class="user-plan" data-i18n="preferences">Preferences</span>
                </span>
                <i class="fa-solid fa-chevron-right user-panel-chevron" aria-hidden="true"></i>
            </button>
            <div class="user-menu" id="user-menu" role="menu" hidden>
                <button type="button" class="user-menu-item" role="menuitem" data-user-action="preferences">
                    <i class="fa-solid fa-wand-magic-sparkles" aria-hidden="true"></i>
                    <span data-i18n="preferences">Preferences</span>
                </button>
                <button type="button" class="user-menu-item" role="menuitem" data-user-action="storage">
                    <i class="fa-solid fa-database" aria-hidden="true"></i>
                    <span data-i18n="dataStorage">Data &amp; Storage</span>
                </button>
                <button type="button" class="user-menu-item" role="menuitem" data-user-action="privacy">
                    <i class="fa-solid fa-shield-halved" aria-hidden="true"></i>
                    <span data-i18n="privacyPolicy">Privacy Policy</span>
                </button>
                <div class="user-menu-divider"></div>
                <a class="user-menu-item" role="menuitem" href="./help.html">
                    <i class="fa-solid fa-circle-question" aria-hidden="true"></i>
                    <span data-i18n="help">Help</span>
                </a>
                <a class="user-menu-item" role="menuitem" href="./about.html">
                    <i class="fa-solid fa-circle-info" aria-hidden="true"></i>
                    <span data-i18n="about">About</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <header class="header-wrapper">
            <button type="button" class="menu-icon" aria-label="Open sidebar" data-i18n-aria-label="openSidebar" onclick="openSidebar()">
                <i class="fa-solid fa-bars" aria-hidden="true"></i>
            </button>
            <div class="header-title">
                <h2 data-i18n="inventory">Inventory</h2>
            </div>
            <div class="user-info header-actions">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="search" id="searchInput" placeholder="Search" data-i18n-placeholder="search">
                </div>
                <button type="button" id="language-toggle" class="language-toggle header-language-toggle" aria-label="Switch language to Chinese" title="Switch language to Chinese" data-active="en">
                    <span class="language-toggle-slider" aria-hidden="true"></span>
                    <span class="language-toggle-option is-active" data-lang-option="en">EN</span>
                    <span class="language-toggle-option" data-lang-option="zh">CN</span>
                </button>
            </div>
        </header>

        <div class="table-wrapper page-enter">
            <div class="inventory-summary-grid" id="inventory-summary">
                <article class="inventory-summary-card">
                    <span data-i18n="totalInventoryItems">Total Items</span>
                    <strong id="inventory-total-count">0</strong>
                </article>
                <article class="inventory-summary-card">
                    <span data-i18n="inStock">In Stock</span>
                    <strong id="inventory-in-stock-count">0</strong>
                </article>
                <article class="inventory-summary-card">
                    <span data-i18n="lowStock">Low Stock</span>
                    <strong id="inventory-low-stock-count">0</strong>
                </article>
                <article class="inventory-summary-card">
                    <span data-i18n="outOfStock">Out of Stock</span>
                    <strong id="inventory-out-of-stock-count">0</strong>
                </article>
            </div>
            <div class="product-title">
                <h3 class="main-title" data-i18n="inventory">Inventory</h3>
                <div class="product-button">
                    <button class="add-button" onclick="openForm()" data-i18n="updateStock">Update Stock</button>
                    <button class="download-button" onclick="exportToCSV()" data-i18n="exportCSV">Export to CSV</button>
                </div>
            </div>
            <div class="form-popup">
                <form class="form-container" id="inventory-form" inert onsubmit="addOrUpdate(event)">
                    <div class="form-columns">
                        <div class="order-first-col">
                            <label for="inventory-id" data-i18n="inventoryID"><b>Inventory ID: </b></label>
                            <input type="text" id="inventory-id" inputmode="numeric" pattern="[0-9]*" placeholder="001" required>

                            <label for="inventory-product-name" data-i18n="inventoryProduct"><b>Product</b></label>
                            <select id="inventory-product-name" required>
                                <option value="" disabled selected hidden data-i18n="chooseInventoryProduct">Choose a product</option>
                            </select>

                            <label for="inventory-category" data-i18n="inventoryCategory"><b>Category</b></label>
                            <select id="inventory-category" required>
                                <option value="" disabled selected hidden data-i18n="chooseInventoryCategory">Choose a category</option>
                                <option value="Hats" data-i18n="hats">Hats</option>
                                <option value="Drinkware" data-i18n="drinkware">Drinkware</option>
                                <option value="Clothing" data-i18n="clothing">Clothing</option>
                                <option value="Accessories" data-i18n="accessories">Accessories</option>
                                <option value="Home decor" data-i18n="homeDecor">Home decor</option>
                            </select>
                        </div>

                        <div class="order-second-col">
                            <label for="stock-quantity" data-i18n="stockQuantity"><b>Stock Quantity</b></label>
                            <input type="number" id="stock-quantity" min="0" step="1" placeholder="24" required>

                            <label for="reorder-level" data-i18n="reorderLevel"><b>Reorder Level</b></label>
                            <input type="number" id="reorder-level" min="0" step="1" placeholder="5" required>

                            <label for="supplier" data-i18n="supplier"><b>Supplier</b></label>
                            <input type="text" id="supplier" placeholder="Supplier name" maxlength="80" required>
                        </div>

                        <div class="order-third-col">
                            <label for="last-updated" data-i18n="lastUpdated"><b>Last Updated</b></label>
                            <input type="date" id="last-updated" required>

                            <label for="inventory-status" data-i18n="inventoryStatus"><b>Status</b></label>
                            <input type="text" id="inventory-status" readonly disabled>
                        </div>
                    </div>

                    <div class="button-col">
                        <button type="submit" class="btn" id="submitBtn" data-i18n="add">Add</button>
                        <button type="button" class="btn cancel" onclick="closeForm()" data-i18n="cancel">Cancel</button>
                    </div>
                </form>
            </div>
            <div class="table-container">
                <table id="inventory-table">
                    <thead>
                        <tr>
                            <th scope="col">
                                <button type="button" class="sort-button" onclick="sortTable('inventoryID', this)" data-i18n="inventoryIDShort">Inventory ID</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" onclick="sortTable('productName', this)" data-i18n="productName">Product Name</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" onclick="sortTable('category', this)" data-i18n="inventoryCategory">Category</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" onclick="sortTable('stockQuantity', this)" data-i18n="stockQuantity">Stock Quantity</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" onclick="sortTable('reorderLevel', this)" data-i18n="reorderLevel">Reorder Level</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" onclick="sortTable('supplier', this)" data-i18n="supplier">Supplier</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" onclick="sortTable('lastUpdated', this)" data-i18n="lastUpdated">Last Updated</button>
                            </th>
                            <th scope="col">
                                <button type="button" class="sort-button" onclick="sortTable('status', this)" data-i18n="inventoryStatus">Status</button>
                            </th>
                            <th scope="col" data-i18n="action">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="./i18n.js"></script>
    <script src="./storage.js"></script>
    <script src="./activity-log.js"></script>
    <script src="./cookie-consent.js"></script>
    <script src="./user-menu.js"></script>
    <script src="./sidebar.js"></script>
    <script src="./inventory.js"></script>
</body>
</html>
